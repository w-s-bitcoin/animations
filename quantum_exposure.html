<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Bitcoin Quantum Exposure | Wicked Smart Bitcoin</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="assets/styles.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preload" href="assets/image_list.json" as="fetch" crossorigin />
    <link rel="prefetch" href="webapps/quantum_exposure/dashboard.html" />
    <style>
      body[data-standalone-modal-shell="1"] {
        margin: 0;
        background: var(--bg);
      }

      body[data-standalone-modal-shell="1"] .buy-coffee {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .shell-theme-toggle {
        width: 34px;
        min-width: 34px;
        min-height: 34px;
        padding: 0;
      }

      .shell-theme-icon {
        font-size: 0.9rem;
        line-height: 1;
      }

      body[data-standalone-modal-shell="1"] .modal {
        display: flex;
      }

      body[data-standalone-modal-shell="1"] #modal-img {
        display: none;
      }
    </style>
  </head>
  <body data-standalone-modal-shell="1">
    <div class="buy-coffee">
      <button class="buy-coffee-btn" id="buyCoffeeBtn" type="button">
        <span id="buyCoffeeIcon">☕</span>
        <span id="buyCoffeeText">· Buy me a coffee</span>
      </button>
      <button
        class="buy-coffee-btn shell-theme-toggle"
        id="shellThemeToggle"
        type="button"
        aria-label="Toggle light or dark mode"
        aria-pressed="false"
        title="Switch to dark mode"
      >
        <span id="shellThemeIcon" class="shell-theme-icon">☼</span>
      </button>
    </div>
    <div class="buy-coffee-overlay" id="buyCoffeeOverlay" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="buy-coffee-modal">
        <button
          type="button"
          class="buy-coffee-close"
          id="buyCoffeeCloseBtn"
          aria-label="Close buy me a coffee panel"
        >×</button>
        <img
          alt="Buy me a coffee"
          class="buy-coffee-img"
          id="buyCoffeeImg"
          draggable="false"
        />
        <div class="buy-coffee-methods" role="group" aria-label="Donation method">
          <button
            type="button"
            class="buy-coffee-method-btn active"
            data-method="lightning"
            aria-pressed="true"
          >Lightning</button>
          <button
            type="button"
            class="buy-coffee-method-btn"
            data-method="liquid"
            aria-pressed="false"
          >Liquid</button>
          <button
            type="button"
            class="buy-coffee-method-btn"
            data-method="onchain"
            aria-pressed="false"
          >On-chain</button>
        </div>
      </div>
    </div>
    <div class="modal" id="modal">
      <div class="modal-controls">
        <button class="close-btn" onclick="closeModal()">×</button>
        <button class="close-btn" onclick="prevImage()">&#8249;</button>
        <button class="close-btn" onclick="nextImage()">&#8250;</button>
        <button id="modal-fav-btn" class="close-btn" onclick="toggleFavoriteFromModal()">★</button>
        <button id="modal-dl-btn" class="close-btn" type="button" aria-label="Download image">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 20h14v-2H5v2zm7-18v10.17l3.59-3.58L17 10l-5 5-5-5 1.41-1.41L11 12.17V2h1z" />
          </svg>
        </button>
        <a id="x-link" class="close-btn modal-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="X/Twitter">
          <svg width="16" height="16" viewBox="0 0 16 16">
            <path d="M12.6.75h2.454l-5.36 6.142L16 15.25h-4.937l-3.867-5.07-4.425 5.07H.316l5.733-6.57L0 .75h5.063l3.495 4.633L12.601.75Zm-.86 13.028h1.36L4.323 2.145H2.865z" />
          </svg>
        </a>
        <a id="youtube-link" class="close-btn modal-link" href="#" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
          <svg height="20" viewBox="0 0 576 512">
            <path d="M549.7 124.1c-6.3-23.8-25-42.4-48.8-48.8C456.5 64 288 64 288 64s-168.5 0-212.9 11.3c-23.8 6.3-42.5 25-48.8 48.8C16 168.5 16 256 16 256s0 87.5 10.3 131.9c6.3 23.8 25 42.4 48.8 48.8C119.5 448 288 448 288 448s168.5 0 212.9-11.3c23.8-6.3 42.5-25 48.8-48.8C560 343.5 560 256 560 256s0-87.5-10.3-131.9zM232 336V176l142 80-142 80z" />
          </svg>
        </a>
      </div>

      <img id="modal-img" src="" alt="Full size image" draggable="false" />
      <div id="modal-embed-wrap" class="modal-embed-wrap" hidden>
        <iframe id="modal-embed" class="modal-embed" title="Interactive visualization" loading="eager"></iframe>
      </div>

      <div id="youtube-overlay" class="youtube-overlay hidden" role="dialog" aria-modal="true">
        <div class="youtube-overlay-content">
          <button type="button" class="youtube-overlay-close" id="youtubeOverlayClose" aria-label="Close YouTube video">×</button>
          <div class="youtube-embed-container">
            <iframe id="youtube-iframe" class="youtube-iframe" title="YouTube video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function primeStandaloneDashboard() {
        var iframe = document.getElementById('modal-embed');
        if (!iframe) return;
        if (!iframe.getAttribute('src')) {
          var search = String(window.location.search || '');
          iframe.setAttribute('src', `webapps/quantum_exposure/dashboard.html${search}`);
        }
      })();
    </script>

    <script>
      const DONATION_LIGHTNING = 'wicked@getalby.com';
      const DONATION_LIQUID = 'VJLDEF7n8TBjyJY2BaAgeVvzPSRMJ7VAP5opW9mB5A7ChyiKHnaguTugZNznxNiV2ZDyPxJyQoeZ2KhM';
      const DONATION_ONCHAIN = 'bc1q8mql8fucypd3dllkawqafytmrnwtv77gzxy346';

      const buyCoffeeBtn = document.getElementById('buyCoffeeBtn');
      const buyCoffeeOverlay = document.getElementById('buyCoffeeOverlay');
      const buyCoffeeCloseBtn = document.getElementById('buyCoffeeCloseBtn');
      const buyCoffeeImg = document.getElementById('buyCoffeeImg');
      const buyCoffeeMethodBtns = Array.from(document.querySelectorAll('.buy-coffee-method-btn'));
      const DASHBOARD_TZ_STORAGE_KEY = 'wicked_dashboard_timezone_v1';
      const DASHBOARD_THEME_STORAGE_KEY = 'quantum-research-dashboard-theme';
      const shellThemeToggle = document.getElementById('shellThemeToggle');
      const shellThemeIcon = document.getElementById('shellThemeIcon');

      function applySiteTheme(themeRaw) {
        const theme = themeRaw === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
      }

      function getSelectedDashboardTimeZone() {
        try {
          const raw = String(localStorage.getItem(DASHBOARD_TZ_STORAGE_KEY) || '').trim();
          if (!raw) return 'UTC';
          Intl.DateTimeFormat('en-US', { timeZone: raw }).format(new Date());
          return raw;
        } catch (_) {
          return 'UTC';
        }
      }

      function getHourInTimeZone(timeZone, now = new Date()) {
        try {
          const parts = new Intl.DateTimeFormat('en-US', {
            timeZone,
            hour: '2-digit',
            hour12: false
          }).formatToParts(now);
          const hourPart = parts.find((part) => part.type === 'hour');
          const hour = Number(hourPart && hourPart.value);
          if (Number.isFinite(hour)) return hour;
        } catch (_) {
        }
        return now.getHours();
      }

      function isBeerTime() {
        const now = new Date();
        const hour = getHourInTimeZone(getSelectedDashboardTimeZone(), now);
        return hour >= 17 || hour < 3;
      }

      function updateBuyMeButton() {
        const icon = document.getElementById('buyCoffeeIcon');
        const text = document.getElementById('buyCoffeeText');
        if (!icon || !text) return;
        if (isBeerTime()) {
          icon.textContent = '🍺';
          text.textContent = '· Buy me a beer';
        } else {
          icon.textContent = '☕';
          text.textContent = '· Buy me a coffee';
        }
      }

      function getImageOrientation() {
        return window.innerHeight >= window.innerWidth ? 'portrait' : 'landscape';
      }

      function updateBuyMeButtonLayout() {
        if (!buyCoffeeBtn) return;
        const narrow = window.innerWidth <= 750;
        buyCoffeeBtn.classList.toggle('buy-coffee-hide-text', narrow);
        if (shellThemeToggle) {
          shellThemeToggle.classList.toggle('compact', narrow);
        }
      }

      function getSelectedTheme() {
        try {
          const value = String(localStorage.getItem(DASHBOARD_THEME_STORAGE_KEY) || '').trim();
          if (value === 'dark' || value === 'light') return value;
        } catch (_) {
        }
        return 'light';
      }

      function updateThemeToggleUi(theme) {
        if (!shellThemeToggle || !shellThemeIcon) return;
        const normalized = theme === 'dark' ? 'dark' : 'light';
        const isDark = normalized === 'dark';
        shellThemeToggle.setAttribute('aria-pressed', String(isDark));
        shellThemeToggle.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        shellThemeIcon.textContent = isDark ? '☾' : '☼';
      }

      function notifyDashboardTheme(theme) {
        const iframe = document.getElementById('modal-embed');
        if (!iframe || !iframe.contentWindow) return;
        iframe.contentWindow.postMessage(
          { type: 'quantum-dashboard-theme', theme: theme === 'dark' ? 'dark' : 'light' },
          window.location.origin
        );
      }

      function setDashboardTheme(theme) {
        const normalized = theme === 'dark' ? 'dark' : 'light';
        try {
          localStorage.setItem(DASHBOARD_THEME_STORAGE_KEY, normalized);
        } catch (_) {
        }
        applySiteTheme(normalized);
        updateThemeToggleUi(normalized);
        notifyDashboardTheme(normalized);
      }

      function toggleDashboardTheme() {
        const nextTheme = getSelectedTheme() === 'dark' ? 'light' : 'dark';
        setDashboardTheme(nextTheme);
      }

      function repositionButtons() {
        const methodsContainer = document.querySelector('.buy-coffee-methods');
        if (!methodsContainer) return;
        const isPortrait = getImageOrientation() === 'portrait';
        if (isPortrait) {
          Object.assign(methodsContainer.style, {
            left: '50%',
            top: '50%',
            bottom: 'auto',
            width: 'auto',
            maxWidth: '92%',
            whiteSpace: 'nowrap',
            gap: 'clamp(6px, 1.5vw, 12px)',
            transform: 'translate(-50%, calc(-100% - clamp(8px, 2vh, 18px)))'
          });
        } else {
          Object.assign(methodsContainer.style, {
            left: '0',
            top: 'auto',
            bottom: '20px',
            width: '50%',
            maxWidth: '',
            whiteSpace: '',
            gap: 'clamp(0.6rem, 1.6vw, 1.25rem)',
            transform: ''
          });
        }
      }

      function updateBuyCoffeeImage(method) {
        const btn = document.querySelector(`.buy-coffee-method-btn[data-method="${method}"]`);
        if (!btn || !buyCoffeeImg) return;

        buyCoffeeMethodBtns.forEach((b) => {
          const isActive = b === btn;
          b.classList.toggle('active', isActive);
          b.setAttribute('aria-pressed', String(isActive));
        });

        const drink = isBeerTime() ? 'beer' : 'coffee';
        const orient = getImageOrientation();
        const normalizedMethod = method === 'on-chain' ? 'onchain' : method;
        buyCoffeeImg.src = `assets/thanks_for_the_${drink}_${orient}_${normalizedMethod}.png`;
        repositionButtons();
      }

      function openBuyCoffeeOverlay() {
        if (!buyCoffeeOverlay) return;
        updateBuyMeButton();
        const activeBtn = document.querySelector('.buy-coffee-method-btn.active');
        updateBuyCoffeeImage((activeBtn && activeBtn.getAttribute('data-method')) || 'lightning');
        buyCoffeeOverlay.style.display = 'flex';
        buyCoffeeOverlay.setAttribute('aria-hidden', 'false');
        document.addEventListener('keydown', onBuyCoffeeKeydown);
      }

      function closeBuyCoffeeOverlay() {
        if (!buyCoffeeOverlay) return;
        buyCoffeeOverlay.style.display = 'none';
        buyCoffeeOverlay.setAttribute('aria-hidden', 'true');
        document.removeEventListener('keydown', onBuyCoffeeKeydown);
      }

      function onBuyCoffeeKeydown(e) {
        if (e.key === 'Escape') {
          closeBuyCoffeeOverlay();
        }
      }

      function getDonationAddressForMethod(method) {
        const m = (method || 'lightning').toLowerCase().trim();
        if (m === 'liquid') return DONATION_LIQUID;
        if (m === 'onchain') return DONATION_ONCHAIN;
        return DONATION_LIGHTNING;
      }

      function getDonationToastForMethod(method) {
        const m = (method || 'lightning').toLowerCase().trim();
        if (m === 'liquid') return 'Liquid address copied to clipboard';
        if (m === 'onchain') return 'On-chain address copied to clipboard';
        return 'Lightning address copied to clipboard';
      }

      async function copyToClipboard(text) {
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
        } catch (err) {
          console.error('Failed to copy to clipboard', err);
        }
      }

      function showCopyToast(message) {
        if (!buyCoffeeOverlay) return;

        let toast = buyCoffeeOverlay.querySelector('.buy-coffee-toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.className = 'buy-coffee-toast';
          Object.assign(toast.style, {
            position: 'fixed',
            top: '50%',
            left: '50%',
            transform: 'translate(-50%, -50%)',
            padding: '0.75rem 1.5rem',
            fontSize: '0.95rem',
            borderRadius: '999px',
            background: 'rgba(0, 0, 0, 0.9)',
            color: '#fff',
            pointerEvents: 'none',
            opacity: '0',
            transition: 'opacity 0.2s ease-out',
            zIndex: '10002',
            border: '1px solid rgba(255, 255, 255, 0.2)'
          });
          buyCoffeeOverlay.appendChild(toast);
        }

        toast.textContent = message;
        toast.style.opacity = '1';

        setTimeout(() => {
          toast.style.opacity = '0';
        }, 2000);
      }

      function handleMethodClick(btn) {
        const method = btn.getAttribute('data-method') || 'lightning';
        updateBuyCoffeeImage(method);
      }

      if (buyCoffeeBtn) {
        buyCoffeeBtn.addEventListener('click', openBuyCoffeeOverlay);
      }

      if (buyCoffeeCloseBtn) {
        buyCoffeeCloseBtn.addEventListener('click', closeBuyCoffeeOverlay);
      }

      if (shellThemeToggle) {
        shellThemeToggle.addEventListener('click', toggleDashboardTheme);
      }

      const dashboardIframe = document.getElementById('modal-embed');
      if (dashboardIframe) {
        dashboardIframe.addEventListener('load', () => {
          notifyDashboardTheme(getSelectedTheme());
        });
      }

      if (buyCoffeeImg) {
        buyCoffeeImg.addEventListener('click', async (e) => {
          e.preventDefault();
          e.stopPropagation();
          const activeBtn = document.querySelector('.buy-coffee-method-btn.active');
          const method = (activeBtn && activeBtn.getAttribute('data-method')) || 'lightning';
          const address = getDonationAddressForMethod(method);
          await copyToClipboard(address);
          showCopyToast(getDonationToastForMethod(method));
        });
      }

      buyCoffeeMethodBtns.forEach((btn) => {
        btn.addEventListener('click', () => handleMethodClick(btn));
      });

      if (buyCoffeeOverlay) {
        buyCoffeeOverlay.addEventListener('click', (e) => {
          if (e.target === buyCoffeeOverlay) {
            closeBuyCoffeeOverlay();
          }
        });
      }

      window.addEventListener('resize', () => {
        updateBuyMeButtonLayout();
        const activeBtn = document.querySelector('.buy-coffee-method-btn.active');
        if (activeBtn && buyCoffeeOverlay && buyCoffeeOverlay.style.display === 'flex') {
          updateBuyCoffeeImage(activeBtn.getAttribute('data-method') || 'lightning');
        }
      });

      function handleDonationTimeZoneChanged() {
        updateBuyMeButton();
        const activeBtn = document.querySelector('.buy-coffee-method-btn.active');
        if (activeBtn && buyCoffeeOverlay && buyCoffeeOverlay.style.display === 'flex') {
          updateBuyCoffeeImage(activeBtn.getAttribute('data-method') || 'lightning');
        }
      }

      updateBuyMeButtonLayout();
      updateBuyMeButton();
      updateBuyCoffeeImage('lightning');
      setInterval(updateBuyMeButton, 5 * 60 * 1000);
      window.addEventListener('storage', (e) => {
        if (e.key === DASHBOARD_TZ_STORAGE_KEY) {
          handleDonationTimeZoneChanged();
          return;
        }
        if (e.key === DASHBOARD_THEME_STORAGE_KEY) {
          const theme = e.newValue === 'dark' ? 'dark' : 'light';
          applySiteTheme(theme);
          updateThemeToggleUi(theme);
          notifyDashboardTheme(theme);
        }
      });

      applySiteTheme(getSelectedTheme());
      updateThemeToggleUi(getSelectedTheme());
    </script>
    <script src="js/29_quantum_exposure_standalone_bootstrap.js" defer></script>
  </body>
</html>
