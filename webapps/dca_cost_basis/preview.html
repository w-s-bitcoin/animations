<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DCA Cost Basis Preview</title>
  <link rel="preload" href="webapp_data/daily_dca.csv" as="fetch" crossorigin />
  <style>
    :root {
      --bg: #000;
      --fg: #f1f5f7;
      --muted: #95a6ae;
      --line: #3a3a3a;
      --accent: #ff9f1c;
      --price-up: #41b36b;
      --price-down: #d33a45;
    }

    :root[data-theme="light"] {
      --bg: #f7f4ee;
      --fg: #1c1b19;
      --muted: #6f685f;
      --line: #d8d0c3;
      --accent: #ff9f1c;
      --price-up: #41b36b;
      --price-down: #d33a45;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: "Space Grotesk", "Helvetica Neue", sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #costBasisChart {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div id="costBasisChart"></div>
  <script src="../shared/preview_shared.js"></script>
  <script src="preview_app.js"></script>
</body>
</html>
