<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Node Count Preview</title>
  <link rel="preload" href="webapp_data/bitcoin_node_history.csv" as="fetch" crossorigin />
  <style>
    :root {
      --bg: #000;
    }

    :root[data-theme="light"] {
      --bg: #f7f4ee;
    }

    html,

      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);

      align-items: stretch;
      justify-content: stretch;

      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }
  </style>

  <div id="historyChart"></div>
