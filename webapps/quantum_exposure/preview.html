<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Quantum Exposure Preview</title>
  <link rel="preload" href="webapp_data/historical_eco.csv" as="fetch" crossorigin />
  <style>
    :root {
      --bg: #f7f4ee;
      --seg-never: #ef476f;
      --seg-inactive: #ffd166;
      --seg-active: #2a9d5b;
      --seg-nonexposed: #8c8c8c;
      --historical-current-marker: #3f3a34;
    }

    :root[data-theme="dark"] {
      --bg: #000000;
      --seg-never: #ff6b8f;
      --seg-inactive: #f7c95c;
      --seg-active: #4fc37d;
      --seg-nonexposed: #73808e;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #historicalChart {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
    }

    .historical-svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .seg-never { fill: var(--seg-never); }
    .seg-inactive { fill: var(--seg-inactive); }
    .seg-active { fill: var(--seg-active); }
    .seg-nonexposed {
      fill: var(--seg-nonexposed);
      opacity: 0.52;
      filter: saturate(0.75);
    }
  </style>
</head>
<body>
  <div id="historicalChart" aria-label="Historical stacked supply chart preview"></div>
  <script src="preview_app.js"></script>
</body>
</html>
