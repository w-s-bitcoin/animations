<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BIP-110 Signaling Preview</title>
  <link rel="preload" href="webapp_data/bip110_metadata.json" as="fetch" crossorigin />
  <link rel="preload" href="webapp_data/bip110_periods.csv" as="fetch" crossorigin />
  <link rel="preload" href="webapp_data/bip110_block_points.bin" as="fetch" crossorigin />
  <style>
    :root {
      --bg: #000;
      --signal: #ff9800;
      --nonsignal: #8b8f93;
      --future: #171717;
      --grid-cols: 63;
      --grid-cell-size: 19px;
      --grid-gap: 1px;
    }

    :root[data-theme="light"] {
      --bg: #f7f4ee;
      --signal: #ff9800;
      --nonsignal: #c8c8c8;
      --future: #e8e0d4;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), var(--grid-cell-size));
      gap: var(--grid-gap);
      width: max-content;
      height: max-content;
      margin: auto;
    }

    .preview-cell {
      width: var(--grid-cell-size);
      height: var(--grid-cell-size);
      background: var(--future);
    }

    .preview-cell.is-signaling {
      background: var(--signal);
    }

    .preview-cell.is-nonsignaling {
      background: var(--nonsignal);
    }
  </style>
</head>
<body>
  <div class="preview-grid" id="previewGrid" aria-label="Current BIP-110 signaling period grid"></div>
  <script src="../shared/preview_shared.js"></script>
  <script src="preview_app.js"></script>
</body>
</html>
