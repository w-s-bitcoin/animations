<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UoA Preview</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
    }
    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
    }
    canvas {
      width: 100%;
      height: 100%;
      border: 1px solid rgba(255,255,255,0.35);
      background: #000;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="l"></canvas>
    <canvas id="r"></canvas>
  </div>
  <script src="../shared/preview_shared.js"></script>
  <script src="preview_app.js"></script>
</body>
</html>
